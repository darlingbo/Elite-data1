<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Airtime - Ghana Data & Airtime Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body onload="checkAuth()">
    <header>
        <h1>Ghana Data & Airtime Hub</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="buy-airtime">
            <h2>Buy Airtime</h2>
            <form id="buy-airtime-form">
                <label for="network">Network:</label>
                <select id="network" required>
                    <option value="MTN">MTN</option>
                    <option value="Telecel">Telecel</option>
                    <option value="Airtel Tigo">Airtel Tigo</option>
                </select>
                <label for="amount">Amount:</label>
                <input type="number" id="amount" required>
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" required>
                <button type="submit">Buy Now</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Ghana Data & Airtime Hub</p>
    </footer>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('buy-airtime-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const network = document.getElementById('network').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const phone = document.getElementById('phone').value;
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            if (!phone) {
                alert('Please enter a phone number');
                return;
            }
            
            // Create a virtual bundle for airtime
            await purchase(`airtime-${network}-${amount}`, phone);
            alert('Purchase initiated! Redirecting to payment...');
        });
    </script>
        });
    </script>
</body>
</html>
